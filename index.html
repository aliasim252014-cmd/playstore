<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Store Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Play Store Clone</h1>
    <input type="text" id="searchInput" placeholder="Uygulama ara..." onkeyup="searchApps()">
</header>

<div class="container">
    <div class="apps" id="apps"></div>
</div>

<!-- LOGIN -->
<div id="loginPanel" class="login-panel">
    <div class="login-box">
        <h2>Giriş Yap</h2>
        <input type="text" id="username" placeholder="Kullanıcı adı">
        <input type="password" id="password" placeholder="Şifre">

        <button onclick="login()">Giriş Yap</button>
        <button onclick="register()">Kayıt Ol</button>
    </div>
</div>

<!-- UPLOAD -->
<div class="upload-box">
    <h2>Uygulama Yükle</h2>

    <input type="text" id="appName" placeholder="Uygulama adı">
    <input type="text" id="appCategory" placeholder="Kategori">
    <input type="file" id="appFile">

    <button onclick="uploadApp()">Yükle</button>
</div>

<script src="script.js"></script>
</body>
</html>
